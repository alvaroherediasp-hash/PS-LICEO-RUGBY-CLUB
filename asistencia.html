<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asistencia</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="header">
    <h1>Asistencia</h1>
  </div>

  <div class="main">

    <div id="tablaAsistencia"></div>

  </div>

  <!-- MODAL VER -->
  <div id="modalJugador" class="modal">
    <div class="modal-box">
      <div id="detalleJugador"></div>
      <button class="btn-cerrar" data-close="modal">Cerrar</button>
    </div>
  </div>

  <!-- MODAL ASISTENCIA -->
  <div id="modalAsistencia" class="modal">
    <div class="modal-box">

      <input id="semana" placeholder="Semana">
      <input id="fechaSemana" placeholder="Fecha">

      <label><input type="checkbox" id="dia1"> Día 1</label>
      <label><input type="checkbox" id="dia2"> Día 2</label>
      <label><input type="checkbox" id="dia3"> Día 3</label>

      <input id="estadoSemana" readonly>

      <textarea id="detalleSemana"></textarea>

      <button id="btnGuardar">Guardar</button>
      <button class="btn-cerrar" data-close="modal">Cancelar</button>

    </div>
  </div>

  <!-- FIREBASE (SIEMPRE PRIMERO) -->
  <script type="module" src="firebase.js"></script>

  <!-- LOGICA -->
  <script src="asistencia.js"></script>

</body>
</html>
