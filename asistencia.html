<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia - Liceo Rugby</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <h1>🏉 Sistema de Asistencia</h1>

  <button class="btn btn-sec" onclick="location.href='index.html'">
    ← Volver
  </button>
</div>

<!-- ================= CONTROLES ================= -->
<div class="toolbar">

  <button class="btn btn-primary" onclick="abrirModalAsistencia()">
    ➕ Cargar asistencia
  </button>

</div>

<!-- ================= TABLA GENERAL ================= -->
<div class="main">

  <div class="card">
    <h3>📊 Asistencia de todos los jugadores</h3>

    <div id="tablaAsistencia">
      <p>Cargando asistencia...</p>
    </div>
  </div>

</div>

<!-- ================= MODAL ASISTENCIA ================= -->
<div class="modal" id="modalAsistencia">

  <div class="modal-box">

    <div class="modal-head">
      <h3>Registrar asistencia</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">

      <!-- JUGADOR -->
      <div class="form-group">
        <label>Jugador</label>
        <select id="jugadorSelect"></select>
      </div>

      <!-- SEMANA -->
      <div class="form-group">
        <label>Semana</label>
        <select id="semana"></select>
      </div>

      <!-- CHECKS -->
      <div class="form-row">
        <label><input type="checkbox" id="dia1"> Día 1</label>
        <label><input type="checkbox" id="dia2"> Día 2</label>
        <label><input type="checkbox" id="dia3"> Día 3</label>
      </div>

      <!-- BOTONES -->
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarAsistencia()">
          Guardar
        </button>
      </div>

    </div>
  </div>
</div>

<script src="asistencia.js"></script>

</body>
</html>
