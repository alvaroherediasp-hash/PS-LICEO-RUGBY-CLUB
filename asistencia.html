<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asistencia</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="header">
    <h1>Asistencia</h1>

    <button id="btnNuevaAsistencia" class="btn-nuevo">
      + Nueva asistencia
    </button>
  </div>

  <div class="main">
    <div id="tablaAsistencia"></div>
  </div>

  <!-- =========================
       MODAL VER HISTORIAL
  ========================== -->
  <div id="modalJugador" class="modal">
    <div class="modal-box">

      <div id="detalleJugador"></div>

      <button class="btn-cerrar" data-close="modal">Cerrar</button>

    </div>
  </div>

  <!-- =========================
       MODAL NUEVA ASISTENCIA
  ========================== -->
  <div id="modalNuevaAsistencia" class="modal">
    <div class="modal-box">

      <h3>Nueva asistencia</h3>

      <select id="nuevoJugadorSelect"></select>

      <select id="nuevoSemana"></select>
      <input id="nuevoFecha" readonly />

      <label><input type="checkbox" id="nuevoDia1"> Día 1</label>
      <label><input type="checkbox" id="nuevoDia2"> Día 2</label>
      <label><input type="checkbox" id="nuevoDia3"> Día 3</label>

      <input id="nuevoEstado" readonly />
      <textarea id="nuevoDetalle"></textarea>

      <button id="btnGuardarNueva">Guardar</button>
      <button class="btn-cerrar" data-close="modal">Cancelar</button>

    </div>
  </div>

  <!-- =========================
       MODAL EDITAR ASISTENCIA
  ========================== -->
  <div id="modalAsistencia" class="modal">
    <div class="modal-box">

      <input id="asistenciaId" type="hidden">
      <input id="jugadorIdHidden" type="hidden">

      <input id="jugadorNombre" readonly>
      <input id="jugadorDni" readonly>

      <select id="semana"></select>
      <input id="fechaSemana" readonly>

      <label><input type="checkbox" id="dia1"> Día 1</label>
      <label><input type="checkbox" id="dia2"> Día 2</label>
      <label><input type="checkbox" id="dia3"> Día 3</label>

      <input id="estadoSemana" readonly>
      <textarea id="detalleSemana"></textarea>

      <button id="btnGuardar">Guardar</button>
      <button class="btn-cerrar" data-close="modal">Cancelar</button>

    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module" src="firebase.js"></script>

  <!-- LOGICA -->
  <script src="asistencia.js"></script>

</body>
</html>
