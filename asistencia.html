<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia - Liceo Rugby</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="header-left">
    <h1>🏉 Sistema de Asistencia</h1>
  </div>

  <button class="btn btn-sec" onclick="location.href='index.html'">
    ← Volver
  </button>
</div>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar">
  <button class="btn btn-primary" onclick="abrirModalAsistencia()">
    ➕ Cargar asistencia
  </button>
</div>

<!-- ================= MAIN ================= -->
<div class="main">
  <div class="card">

    <div class="card-head">
      <h3>📊 Jugadores</h3>
    </div>

    <div id="tablaAsistencia" class="tabla">
      <p>Cargando jugadores...</p>
    </div>

  </div>
</div>

<!-- ================= MODAL CARGAR / EDITAR ================= -->
<div class="modal" id="modalAsistencia">

  <div class="modal-box">

    <div class="modal-head">
      <h3 id="tituloModalAsistencia">Registrar asistencia</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">

      <!-- 🔥 ID OCULTO PARA EDITAR -->
      <input type="hidden" id="asistenciaId">

      <div class="form-group">
        <label>DNI</label>
        <input id="jugadorDni" disabled>
      </div>

      <!-- JUGADOR (SOLO VISUAL) -->
      <div class="form-group">
        <label>Jugador</label>
        <input id="jugadorNombre" disabled>
      </div>

<input type="hidden" id="jugadorSelect">
      

      <!-- SEMANA -->
<!-- SEMANA + FECHA (FIX PRO) -->
<div class="semana-info">
  <span>📆 Semana</span>
  <span id="semanaLabel">-</span>
  <span>•</span>
  <span id="fechaSemanaLabel">-</span>
</div>

      <!-- FECHA -->
      <div class="form-group">
        <label>Fecha (lunes de la semana)</label>
        <input type="date" id="fechaSemana">
      </div>

      <!-- CHECKS -->
      <div class="form-row">
        <label><input type="checkbox" id="dia1"> Día 1</label>
        <label><input type="checkbox" id="dia2"> Día 2</label>
        <label><input type="checkbox" id="dia3"> Partido</label>
      </div>

      <!-- DETALLE -->
      <div class="form-group">
        <label>Detalle</label>
        <textarea id="detalleSemana" placeholder="Ej: llegó tarde, lesionado, etc."></textarea>
      </div>

      <!-- ESTADO -->
      <div class="form-group">
        <label>Estado</label>
        <input id="estadoSemana" disabled>
      </div>

      <!-- BOTONES -->
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cancelar</button>

        <!-- 🔥 CAMBIA AUTOMÁTICO -->
        <button class="btn btn-primary" onclick="guardarAsistencia()">
          💾 Guardar
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL VER JUGADOR ================= -->
<div class="modal" id="modalJugador">
  <div class="modal-box" style="max-width:900px">

    <div class="modal-head">
      <h3>📊 Historial del jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">
      <div id="detalleJugador"></div>
    </div>

  </div>
</div>

<!-- ================= JS ================= -->
<script type="module" src="firebase.js"></script>
<script type="module" src="asistencia.js"></script>

</body>
</html>
