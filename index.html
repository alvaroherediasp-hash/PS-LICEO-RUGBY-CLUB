<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Rugby Club</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>🏉 Liceo Rugby Club</h1>
  <button id="btnNuevo">+ Nuevo</button>
</div>

<div class="toolbar">
  <input id="buscar" placeholder="Buscar jugador...">
  <button id="btnReload">🔄</button>
</div>

<div id="estado"></div>
<div id="tabla"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <button id="btnCerrar">X</button>

    <input id="dni" placeholder="DNI">
    <input id="nombre" placeholder="Nombre">
    <input id="apodo" placeholder="Apodo">
    <input id="celular" placeholder="Celular">
    <input id="correo" placeholder="Correo">

    <select id="p1"><option value="">Puesto 1</option></select>
    <select id="p2"><option value="">Puesto 2</option></select>
    <select id="p3"><option value="">Puesto 3</option></select>

    <button id="btnGuardar">Guardar</button>

  </div>
</div>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
