<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Jugadores - Rugby</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=Russo+One&display=swap" rel="stylesheet"/>
<style>

  :root {
    --rugby-green: #1D4E27;
    --rugby-green-light: #2D7A3A;
    --accent: #4ADE80;
    --bg: #0a0a0a;
    --bg2: #131313;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --border: rgba(255,255,255,0.06);
    --text: #F5F5F5;
    --text-muted: #888888;
    --gold: #F5A623;
    --orange: #FF6B35;
    --rojo: #DC2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(145deg, var(--rugby-green) 0%, var(--rugby-green-light) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .header-text h1 {
    font-family: 'Russo One', sans-serif;
    font-size: 24px;
    background: linear-gradient(90deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-text p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .header-stats {
    display: flex;
    gap: 20px;
  }

  .stat-badge {
    text-align: center;
  }

  .stat-badge .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-badge .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* MENÚ DE HOJAS */
  .menu-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 30px;
    overflow-x: auto;
  }

  .menu-tabs {
    display: flex;
    gap: 10px;
    white-space: nowrap;
  }

  .menu-tab {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .menu-tab:hover {
    background: var(--bg4);
    border-color: var(--rugby-green);
  }

  .menu-tab.active {
    background: var(--rugby-green);
    border-color: var(--rugby-green);
    color: #fff;
  }

  .menu-tab .count {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 8px;
  }

  /* BUSCADOR */
  .search-wrap {
    padding: 20px 30px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .search-row {
    display: flex;
    gap: 12px;
    max-width: 500px;
  }

  .search-input {
    flex: 1;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px 16px;
    font-size: 14px;
    outline: none;
  }

  .search-input:focus {
    border-color: var(--rugby-green);
  }

  /* MAIN CONTENT */
  .main {
    padding: 24px 30px;
  }

  /* ESTADO */
  .estado {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .estado.loading {
    display: flex;
    background: rgba(29, 126, 39, 0.15);
    border: 1px solid rgba(29, 126, 39, 0.3);
    color: var(--accent);
  }

  .estado.error {
    display: flex;
    background: rgba(220, 38, 38, 0.15);
    border: 1px solid rgba(220, 38, 38, 0.3);
    color: #fca5a5;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(29, 126, 39, 0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABLA JUGADORES */
  .tabla-container {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .tabla-header {
    display: grid;
    grid-template-columns: 60px 1fr 100px 100px 100px 100px 100px;
    gap: 10px;
    padding: 14px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .tabla-body {
    max-height: calc(100vh - 350px);
    overflow-y: auto;
  }

  .jugador-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 100px 100px 100px 100px;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .jugador-row:hover {
    background: var(--bg3);
  }

  .jugador-row:last-child {
    border-bottom: none;
  }

  .jugador-avatar {
    width: 40px;
    height: 40px;
    background: var(--rugby-green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Russo One', sans-serif;
    font-size: 16px;
    color: #fff;
  }

  .jugador-nombre {
    font-weight: 600;
    font-size: 14px;
  }

  .jugador-dni {
    font-size: 12px;
    color: var(--text-muted);
  }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
  }

  .badge.asist {
    background: rgba(29, 126, 39, 0.2);
    color: var(--accent);
  }

  .badge.falta {
    background: rgba(220, 38, 38, 0.2);
    color: #fca5a5;
  }

  .badge.pagado {
    background: rgba(74, 222, 128, 0.2);
    color: #4ADE80;
  }

  .badge.pendiente {
    background: rgba(245, 166, 35, 0.2);
    color: var(--gold);
  }

  .badge.present {
    background: rgba(29, 126, 39, 0.2);
    color: var(--accent);
  }

  .badge.absent {
    background: rgba(220, 38, 38, 0.2);
    color: #fca5a5;
  }

  .badge.ok {
    background: rgba(29, 126, 39, 0.2);
    color: var(--accent);
  }

  /* VER DETALLE MODAL */
  .detalle-section {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .detalle-section:last-child {
    border-bottom: none;
  }

  .detalle-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .detalle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 12px;
  }

  .detalle-item {
    text-align: center;
  }

  .detalle-item .valor {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .detalle-item .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.visible {
    display: flex;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h3 {
    font-family: 'Russo One', sans-serif;
    font-size: 20px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text);
    font-size: 24px;
    cursor: pointer;
  }

  .modal-body {
    padding: 20px 24px;
  }

  /* LOADING */
  .loading-placeholder {
    padding: 60px;
    text-align: center;
    color: var(--text-muted);
  }

  .loading-placeholder .spinner {
    width: 30px;
    height: 30px;
    margin: 0 auto 16px;
    border-width: 3px;
  }

  /* FILTRO NEGATIVO */
  .filter-badges {
    display: flex;
    gap: 8px;
    padding: 12px 0;
    flex-wrap: wrap;
  }

  .filter-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    background: var(--bg3);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .filter-badge:hover, .filter-badge.active {
    background: var(--rugby-green);
    border-color: var(--rugby-green);
  }

  @media (max-width: 768px) {
    .header {
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    .header-stats {
      display: none;
    }
    .tabla-header, .jugador-row {
      grid-template-columns: 50px 1fr 80px;
    }
    .jugador-row > *:nth-child(n+4) {
      display: none;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🏉</div>
    <div class="header-text">
      <h1>Menú de Jugadores</h1>
      <p>Información general de todos los jugadores</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-badge">
      <div class="num" id="totalJugadores">—</div>
      <div class="label">Jugadores</div>
    </div>
    <div class="stat-badge">
      <div class="num" id="totalAsistencias">—</div>
      <div class="label">% Asistencia</div>
    </div>
    <div class="stat-badge">
      <div class="num" id="totalCuotas">—</div>
      <div class="label">Cuotas OK</div>
    </div>
  </div>
</div>

<div class="menu-wrap">
  <div class="menu-tabs" id="menuTabs">
    <div class="menu-tab active" data-hoja="todos">Todos <span class="count" id="countTodos">0</span></div>
    <div class="menu-tab" data-hoja="asist">Asistencia <span class="count" id="countAsist">0</span></div>
    <div class="menu-tab" data-hoja="club">Cuotas Club <span class="count" id="countClub">0</span></div>
    <div class="menu-tab" data-hoja="union">Cuotas Unión <span class="count" id="countUnion">0</span></div>
    <div class="menu-tab" data-hoja="tt">Tercer Tiempo <span class="count" id="countTT">0</span></div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="busqueda" type="text" placeholder="Buscar por nombre o DNI...">
  </div>
  <div class="filter-badges" id="filterBadges">
    <span class="filter-badge active" data-filter="todos">Todos</span>
    <span class="filter-badge" data-filter="asist-ok">Con Asistencia</span>
    <span class="filter-badge" data-filter="asist-bad">Con Faltas</span>
    <span class="filter-badge" data-filter="cuotas-ok">Cuotas OK</span>
    <span class="filter-badge" data-filter="cuotas-pend">Cuotas Pendientes</span>
  </div>
</div>

<div class="main">
  <div class="estado" id="estado"></div>

  <div class="tabla-container" id="tablaContainer">
    <div class="loading-placeholder">
      <div class="spinner"></div>
      <p>Cargando datos...</p>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modalDetalle">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalNombre">—</h3>
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Se carga dinámico -->
    </div>
  </div>
</div>

<script>
// ===== CONFIGURACIÓN =====
var SHEET_ID = "1DSLMUY658O0-liB7bpv0g8VFTpGiv3nNNgDXc2X97VM";

// GIDs de las hojas
var HOJAS = {
  asist: { gid: "347341918", nombre: "Asistencia" },
  club: { gid: "162977848", nombre: "Cuotas Club" },
  union: { gid: "1658884378", nombre: "Cuotas Unión" },
  tt: { gid: "1159874602", nombre: "Tercer Tiempo" }
};

var hojaActiva = "todos";
var filtroActivo = "todos";
var datosTodos = [];
var datosFiltrados = [];

function csvURL(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}

function fetchCSV(gid) {
  return fetch(csvURL(gid)).then(r => r.text()).then(txt => txt.split("\n").map(l => l.split(",")));
}

function esBool(v) {
  if (!v) return false;
  return ["TRUE", "VERDADERO", "1"].includes(v.toString().toUpperCase().trim());
}

function norm(s) {
  return (s || "").toString().toUpperCase().trim();
}

// ===== CARGAR TODOS LOS DATOS =====
async function cargarDatos() {
  var estado = document.getElementById("estado");
  estado.className = "estado loading";
  estado.innerHTML = '<div class="spinner"></div> Cargando datos...';

  try {
    var resultados = await Promise.all([
      fetchCSV(HOJAS.asist.gid),
      fetchCSV(HOJAS.club.gid),
      fetchCSV(HOJAS.union.gid),
      fetchCSV(HOJAS.tt.gid)
    ]);

    var asist = resultados[0].slice(1);
    var club = resultados[1].slice(1);
    var union = resultados[2].slice(1);
    var tt = resultados[3].slice(1);

    // Crear mapa de datos por DNI
    datosTodos = [];

    asist.forEach(fila => {
      var dni = norm(fila[0]);
      if (!dni) return;

      var filaC = club.find(f => norm(f[0]) === dni);
      var filaU = union.find(f => norm(f[0]) === dni);
      var filaTT = tt.find(f => norm(f[0]) === dni);

      // Calcular asistencia
      var colsAsist = fila.slice(2);
      var cantAsist = colsAsist.filter(esBool).length;
      var cantFaltas = colsAsist.length - cantAsist;
      var pctAsist = colsAsist.length > 0 ? Math.round((cantAsist / colsAsist.length) * 100) : 0;

      // Cuotas club
      var cuotasClub = 0;
      if (filaC) {
        cuotasClub = (esBool(filaC[2]) ? 1 : 0) + (esBool(filaC[3]) ? 1 : 0);
      }

      // Unión
      var colsUnion = filaU ? filaU.slice(2, 14) : [];
      var unionPag = colsUnion.filter(esBool).length;
      var unionPend = colsUnion.length - unionPag;

      // Tercer tiempo
      var colsTT = filaTT ? filaTT.slice(2, 14) : [];
      var ttPres = colsTT.filter(esBool).length;
      var ttAus = colsTT.length - ttPres;

      datosTodos.push({
        dni: dni,
        nombre: fila[1] || "",
        colsAsist: colsAsist,
        cantAsist: cantAsist,
        cantFaltas: cantFaltas,
        pctAsist: pctAsist,
        cuotasClub: cuotasClub,
        colsUnion: colsUnion,
        unionPag: unionPag,
        unionPend: unionPend,
        colsTT: colsTT,
        ttPres: ttPres,
        ttAus: ttAus
      });
    });

    datosFiltrados = [...datosTodos];
    renderizarTabla();
    actualizarContadores();
    
    estado.innerHTML = "";
    estado.style.display = "none";

  } catch(err) {
    console.error(err);
    estado.className = "estado error";
    estado.innerHTML = '<span>⚠️</span> Error al cargar datos';
  }
}

function actualizarContadores() {
  var total = datosTodos.length;
  var asistProm = datosTodos.reduce((s, j) => s + j.pctAsist, 0) / total || 0;
  var cuotasOK = datosTodos.filter(j => j.cuotasClub >= 2).length;

  document.getElementById("totalJugadores").textContent = total;
  document.getElementById("totalAsistencias").textContent = Math.round(asistProm) + "%";
  document.getElementById("totalCuotas").textContent = cuotasOK;

  document.getElementById("countTodos").textContent = total;
  document.getElementById("countAsist").textContent = datosTodos.filter(j => j.cantFaltas === 0).length;
  document.getElementById("countClub").textContent = cuotasOK;
  document.getElementById("countUnion").textContent = datosTodos.filter(j => j.unionPend === 0).length;
  document.getElementById("countTT").textContent = datosTodos.filter(j => j.ttAus === 0).length;
}

function renderizarTabla() {
  var container = document.getElementById("tablaContainer");
  var busqueda = document.getElementById("busqueda").value.toLowerCase();

  var filtrados = datosFiltrados.filter(j => {
    if (busqueda && !j.nombre.toLowerCase().includes(busqueda) && !j.dni.includes(busqueda)) {
      return false;
    }
    return true;
  });

  if (filtrados.length === 0) {
    container.innerHTML = '<div class="loading-placeholder"><p>No hay jugadores</p></div>';
    return;
  }

  var html = `
    <div class="tabla-header">
      <div></div>
      <div>Jugador</div>
      <div>Asistencia</div>
      <div>Club</div>
      <div>Unión</div>
      <div>3er Tiempo</div>
      <div></div>
    </div>
    <div class="tabla-body">
  `;

  filtrados.forEach(j => {
    var inicial = j.nombre.charAt(0) || "?";
    var nombreCorto = j.nombre.length > 25 ? j.nombre.substring(0, 25) + "..." : j.nombre;

    html += `
      <div class="jugador-row" onclick="verDetalle('${j.dni}')">
        <div class="jugador-avatar">${inicial}</div>
        <div>
          <div class="jugador-nombre">${nombreCorto}</div>
          <div class="jugador-dni">${j.dni}</div>
        </div>
        <div>
          <span class="badge ${j.cantFaltas === 0 ? 'asist' : (j.cantFaltas > 3 ? 'falta' : 'asist')}">
            ${j.pctAsist}%
          </span>
        </div>
        <div>
          <span class="badge ${j.cuotasClub >= 2 ? 'ok' : (j.cuotasClub > 0 ? 'pagado' : 'pendiente')}">
            ${j.cuotasClub}/2
          </span>
        </div>
        <div>
          <span class="badge ${j.unionPend === 0 ? 'ok' : 'pendiente'}">
            ${j.unionPag}/12
          </span>
        </div>
        <div>
          <span class="badge ${j.ttAus === 0 ? 'present' : 'absent'}">
            ${j.ttPres}/${j.colsTT.length || 12}
          </span>
        </div>
        <div>
          <button class="btn btn-sm" onclick="event.stopPropagation(); verDetalle('${j.dni}')">Ver</button>
        </div>
      </div>
    `;
  });

  html += "</div>";
  container.innerHTML = html;
}

function verDetalle(dni) {
  var jugador = datosTodos.find(j => j.dni === dni);
  if (!jugador) return;

  var modal = document.getElementById("modalDetalle");
  var body = document.getElementById("modalBody");

  document.getElementById("modalNombre").textContent = jugador.nombre;

  body.innerHTML = `
    <div class="detalle-section">
      <div class="detalle-titulo">Datos Personales</div>
      <div class="detalle-grid">
        <div class="detalle-item">
          <div class="valor">${jugador.dni}</div>
          <div class="label">DNI</div>
        </div>
      </div>
    </div>

    <div class="detalle-section">
      <div class="detalle-titulo">🏉 Asistencia (${jugador.colsAsist.length} entrenamientos)</div>
      <div class="detalle-grid">
        <div class="detalle-item">
          <div class="valor" style="color: var(--accent)">${jugador.cantAsist}</div>
          <div class="label">Presentes</div>
        </div>
        <div class="detalle-item">
          <div class="valor" style="color: #fca5a5">${jugador.cantFaltas}</div>
          <div class="label">Faltas</div>
        </div>
        <div class="detalle-item">
          <div class="valor">${jugador.pctAsist}%</div>
          <div class="label">% Asistencia</div>
        </div>
      </div>
    </div>

    <div class="detalle-section">
      <div class="detalle-titulo">💳 Cuotas Club</div>
      <div class="detalle-grid">
        <div class="detalle-item">
          <div class="valor">Cuota 1</div>
          <div class="label">${jugador.cuotasClub >= 1 ? '✓ Pagada' : '✗ Pendiente'}</div>
        </div>
        <div class="detalle-item">
          <div class="valor">Cuota 2</div>
          <div class="label">${jugador.cuotasClub >= 2 ? '✓ Pagada' : '✗ Pendiente'}</div>
        </div>
      </div>
    </div>

    <div class="detalle-section">
      <div class="detalle-titulo">🏛️ Cuotas Unión (12 meses)</div>
      <div class="detalle-grid">
        <div class="detalle-item">
          <div class="valor" style="color: var(--accent)">${jugador.unionPag}</div>
          <div class="label">Pagados</div>
        </div>
        <div class="detalle-item">
          <div class="valor" style="color: #fca5a5">${jugador.unionPend}</div>
          <div class="label">Pendientes</div>
        </div>
      </div>
    </div>

    <div class="detalle-section">
      <div class="detalle-titulo">🍽️ Tercer Tiempo</div>
      <div class="detalle-grid">
        <div class="detalle-item">
          <div class="valor" style="color: var(--accent)">${jugador.ttPres}</div>
          <div class="label">Presentes</div>
        </div>
        <div class="detalle-item">
          <div class="valor" style="color: #fca5a5">${jugador.ttAus}</div>
          <div class="label">Ausentes</div>
        </div>
      </div>
    </div>
  `;

  modal.classList.add("visible");
}

function cerrarModal() {
  document.getElementById("modalDetalle").classList.remove("visible");
}

// ===== EVENTOS =====
document.getElementById("menuTabs").addEventListener("click", function(e) {
  var tab = e.target.closest(".menu-tab");
  if (!tab) return;

  document.querySelectorAll(".menu-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");

  var hoja = tab.dataset.hoja;
  hojaActiva = hoja;

  if (hoja === "todos") {
    datosFiltrados = [...datosTodos];
  } else {
    datosFiltrados = datosTodos.filter(j => {
      if (hoja === "asist") return j.cantFaltas === 0;
      if (hoja === "club") return j.cuotasClub >= 2;
      if (hoja === "union") return j.unionPend === 0;
      if (hoja === "tt") return j.ttAus === 0;
      return true;
    });
  }

  renderizarTabla();
});

document.getElementById("filterBadges").addEventListener("click", function(e) {
  var badge = e.target.closest(".filter-badge");
  if (!badge) return;

  document.querySelectorAll(".filter-badge").forEach(b => b.classList.remove("active"));
  badge.classList.add("active");

  var filtro = badge.dataset.filter;
  filtroActivo = filtro;

  if (filtro === "todos") {
    datosFiltrados = [...datosTodos];
  } else if (filtro === "asist-ok") {
    datosFiltrados = datosTodos.filter(j => j.cantFaltas === 0);
  } else if (filtro === "asist-bad") {
    datosFiltrados = datosTodos.filter(j => j.cantFaltas > 3);
  } else if (filtro === "cuotas-ok") {
    datosFiltrados = datosTodos.filter(j => j.cuotasClub >= 2);
  } else if (filtro === "cuotas-pend") {
    datosFiltrados = datosTodos.filter(j => j.cuotasClub < 2);
  }

  renderizarTabla();
});

document.getElementById("busqueda").addEventListener("input", renderizarTabla);

document.getElementById("modalDetalle").addEventListener("click", function(e) {
  if (e.target === this) cerrarModal();
});

// Iniciar
cargarDatos();
</script>

</body>
</html>
