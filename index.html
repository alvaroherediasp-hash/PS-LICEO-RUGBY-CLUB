<div id="tabla" class="tabla"></div>

<!-- MODAL NUEVO / EDITAR -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-head">
      <h3 id="tituloModal">Nuevo Jugador</h3>
      <button id="btnCerrar">✖</button>
    </div>

    <div class="modal-body">

      <input id="dni" placeholder="DNI">
      <input id="nombre" placeholder="Nombre">
      <input id="apodo" placeholder="Apodo">
      <input id="celular" placeholder="Celular">
      <input id="correo" placeholder="Correo">

      <select id="p1">...</select>
      <select id="p2">...</select>
      <select id="p3">...</select>

      <div class="acciones">
        <button id="btnGuardar">💾 Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL VER -->
<div class="modal" id="modalVer">
  <div class="modal-box">

    <div class="modal-head">
      <h3>Jugador</h3>
      <button onclick="cerrar()">✖</button>
    </div>

    <div id="detalle"></div>

    <div class="acciones">
      <button id="btnEditar">✏️ Editar</button>
      <button id="btnEliminar">🗑 Eliminar</button>
    </div>

  </div>
</div>
