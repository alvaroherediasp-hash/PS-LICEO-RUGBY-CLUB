<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Rugby Club</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="nav-left">
    <h1>🏉 Liceo Rugby</h1>
  </div>

  <div class="nav-right">
    <a href="index.html" class="nav-link active">Jugadores</a>
    <a href="asistencia.html" class="nav-link">Asistencia</a>
  </div>
</nav>

<!-- ================= HEADER ================= -->
<div class="header">
  <div>
    <h2>Gestión de Jugadores</h2>
    <p class="sub">Administración del plantel</p>
  </div>

  <button class="btn-nuevo" id="btnNuevo">+ Nuevo</button>
</div>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar">
  <input id="buscar" placeholder="🔍 Buscar jugador por nombre o DNI...">
  <button id="btnReload" class="btn-icon">🔄</button>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <!-- ESTADO -->
  <div id="estado" class="estado"></div>

  <!-- TABLA -->
  <div id="tabla" class="tabla">
    <p>Cargando jugadores...</p>
  </div>

</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-head">
      <h3 id="tituloModal">Nuevo Jugador</h3>
      <button id="btnCerrar" class="modal-close">✖</button>
    </div>

    <div class="modal-body">

      <input id="dni" placeholder="DNI">
      <input id="nombre" placeholder="Nombre">
      <input id="apodo" placeholder="Apodo">
      <input id="celular" placeholder="Celular">
      <input id="correo" placeholder="Correo">

      <!-- SELECTS -->
      <select id="p1">
        <option value="">Puesto 1</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <select id="p2">
        <option value="">Puesto 2</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <select id="p3">
        <option value="">Puesto 3</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <div class="acciones">
        <button id="btnGuardar" class="btn-primary">💾 Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL VER ================= -->
<div class="modal" id="modalVer">
  <div class="modal-box">

    <div class="modal-head">
      <h3>Jugador</h3>
      <button id="btnCerrarVer" class="modal-close">✖</button>
    </div>

    <div id="detalle"></div>

    <div class="acciones">
      <button id="btnEditar" class="btn-warning">✏️ Editar</button>
      <button id="btnEliminar" class="btn-danger">🗑 Eliminar</button>
    </div>

  </div>
</div>

<!-- ================= JS ================= -->
<script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
