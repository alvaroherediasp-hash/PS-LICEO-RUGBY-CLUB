<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Rugby Club</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>🏉 Liceo Rugby Club</h1>
  <button id="btnNuevo">+ Nuevo</button>
</div>

<div class="toolbar">
  <input id="buscar" placeholder="Buscar jugador...">
  <button id="btnReload">🔄</button>
</div>

<div id="estado"></div>
<div id="tabla"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <button id="btnCerrar">X</button>

    <input id="dni" placeholder="DNI">
    <input id="nombre" placeholder="Nombre">
    <input id="apodo" placeholder="Apodo">
    <input id="celular" placeholder="Celular">
    <input id="correo" placeholder="Correo">

    <!-- PUESTO 1 -->
      <select id="p1">
        <option value="">Puesto 1</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <!-- PUESTO 2 -->
      <select id="p2">
        <option value="">Puesto 2</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <!-- PUESTO 3 -->
      <select id="p3">
        <option value="">Puesto 3</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

    <button id="btnGuardar">Guardar</button>

  </div>
</div>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
