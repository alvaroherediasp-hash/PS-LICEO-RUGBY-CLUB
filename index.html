<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liceo Rugby Club</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Russo+One&display=swap" rel="stylesheet"/>
<style>
  :root { --green: #1D4E27; --green-light: #2D7A3A; --accent: #4ADE80; --bg: #0a0a0a; --bg2: #131313; --bg3: #1a1a1a; --bg4: #222222; --border: rgba(255,255,255,0.06); --text: #F5F5F5; --muted: #888888; --gold: #F5A623; --orange: #FF6B35; --rojo: #DC2626; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
  
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .icon { width: 44px; height: 44px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .header h1 { font-family: 'Russo One', sans-serif; font-size: 18px; }
  .btn-nuevo { background: var(--green); color: #fff; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }

  .conectar-box { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; margin-top: 4px; }
  .conectar-box .punto { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .conectar-box.error .punto { background: var(--rojo); }
  .conectar-box.error { color: #fca5a5; }

  .tabs { background: var(--bg2); padding: 12px 20px; display: flex; gap: 8px; overflow-x: auto; }
  .tab { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .tab:hover { background: var(--bg4); }
  .tab.active { background: var(--green); color: #fff; }

  .toolbar { background: var(--bg2); padding: 12px 20px; display: flex; gap: 12px; border-bottom: 1px solid var(--border); }
  .buscar { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; width: 250px; }

  .main { padding: 20px; }
  .estado { display: none; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
  .estado.show { display: flex; align-items: center; gap: 10px; }
  .estado.loading { background: rgba(29,126,39,0.15); color: var(--accent); }
  .estado.error { background: rgba(220,38,38,0.15); color: #fca5a5; }
  .estado.success { background: rgba(29,126,39,0.15); color: var(--accent); }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(29,126,39,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabla { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tabla-head { display: flex; gap: 10px; padding: 12px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  .tabla-body { max-height: calc(100vh - 320px); overflow-y: auto; }
  .fila { display: flex; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; }
  .fila:hover { background: var(--bg3); }

  .avatar { width: 36px; height: 36px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Russo One', sans-serif; font-size: 13px; color: #fff; flex-shrink: 0; }
  .dato { flex: 1; }
  .dato div:first-child { font-weight: 600; }
  .dato div:last-child { font-size: 11px; color: var(--muted); }

  .badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .badge.ok { background: rgba(29,126,39,0.2); color: var(--accent); }
  .badge.falta { background: rgba(220,38,38,0.2); color: #fca5a5; }
  .badge.incompleto { background: rgba(245,166,35,0.2); color: var(--gold); }
  .badge.completo { background: rgba(29,126,39,0.2); color: var(--accent); }

  .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-sec { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--rojo); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto; }
  .modal-head { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-head h3 { font-family: 'Russo One', sans-serif; font-size: 14px; }
  .modal-close { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
  .modal-body { padding: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px; font-size: 13px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .semana { background: var(--bg3); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .semana-title { font-size: 10px; color: var(--accent); margin-bottom: 6px; }
  .semana-checks { display: flex; gap: 16px; flex-wrap: wrap; }
  .semana-status { font-size: 10px; margin-left: 10px; }
  .semana-status.ok { color: var(--accent); }
  .semana-status.incompleto { color: var(--gold); }
  .semana-status.falta { color: #fca5a5; }
  .check-item { display: flex; align-items: center; gap: 5px; }
  .check-item label { font-size: 10px; color: var(--muted); }
  .check { width: 18px; height: 18px; accent-color: var(--green); }

  .meses { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .mes { display: flex; align-items: center; gap: 5px; background: var(--bg3); padding: 6px; border-radius: 4px; }
  .mes label { font-size: 10px; color: var(--muted); }

  .detalle { background: var(--bg3); border-radius: 8px; padding: 14px; }
  .detalle p { font-size: 12px; margin-bottom: 6px; }
  .detalle strong { color: var(--accent); }

  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }

  @media (max-width: 700px) {
    .tabla-head, .fila { display: grid; grid-template-columns: 36px 1fr 60px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="icon">🏉</div>
    <div>
      <h1>Liceo Rugby Club</h1>
      <div class="conectar-box" id="conectar">
        <span class="punto"></span>
        <span>Conectando...</span>
      </div>
    </div>
  </div>
  <button class="btn-nuevo" onclick="abrirModal()">+ Nuevo</button>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="jugadores">👥 Jugadores</div>
  <div class="tab" data-tab="asistencia">🏉 Asistencia</div>
  <div class="tab" data-tab="club">💳 Cuotas Club</div>
  <div class="tab" data-tab="union">🏛️ Cuotas Unión</div>
</div>

<div class="toolbar">
  <input class="buscar" id="buscar" placeholder="Buscar...">
  <button class="btn btn-primary" onclick="cargar()">🔄</button>
</div>

<div class="main">
  <div class="estado" id="estado"></div>
  <div class="tabla" id="tabla">
    <div style="padding: 40px; text-align: center; color: var(--muted);">
      <div class="spinner" style="width: 24px; height: 24px; margin: 0 auto 12px;"></div>
      <p>Cargando...</p>
    </div>
  </div>
</div>

<!-- MODAL JUGADOR -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="titulo">Nuevo Jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="idDNI">
      <div class="form-row">
        <div class="form-group">
          <label>DNI</label>
          <input type="text" id="dni" placeholder="12345678">
        </div>
        <div class="form-group">
          <label>Celular</label>
          <input type="text" id="celular" placeholder="+54 9 11...">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Juan Pérez">
      </div>
      <div class="form-group">
        <label>Correo</label>
        <input type="email" id="correo" placeholder="juan@email.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Puesto 1</label>
          <select id="p1">
            <option value="">Seleccionar...</option>
            <option value="Hook">Hook</option>
            <option value="Pilier">Pilier</option>
            <option value="Segunda">Segunda</option>
            <option value="Octavo">Octavo</option>
            <option value="Ala">Ala</option>
            <option value="Centro">Centro</option>
            <option value="Apertura">Apertura</option>
            <option value="Medio">Medio scrum</option>
            <option value="Flyhalf">Flyhalf</option>
            <option value="Wing">Wing</option>
            <option value="Fullback">Fullback</option>
          </select>
        </div>
        <div class="form-group">
          <label>Puesto 2</label>
          <select id="p2">
            <option value="">Seleccionar...</option>
            <option value="Hook">Hook</option>
            <option value="Pilier">Pilier</option>
            <option value="Segunda">Segunda</option>
            <option value="Octavo">Octavo</option>
            <option value="Ala">Ala</option>
            <option value="Centro">Centro</option>
            <option value="Wing">Wing</option>
            <option value="Fullback">Fullback</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Puesto 3</label>
        <select id="p3">
          <option value="">Seleccionar...</option>
          <option value="Hook">Hook</option>
          <option value="Pilier">Pilier</option>
          <option value="Segunda">Segunda</option>
          <option value="Octavo">Octavo</option>
          <option value="Ala">Ala</option>
          <option value="Centro">Centro</option>
          <option value="Wing">Wing</option>
          <option value="Fullback">Fullback</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-danger" id="btnElim" onclick="eliminar()" style="display:none;">Eliminar</button>
        <button class="btn btn-sec" onclick="cerrar()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL VER -->
<div class="modal" id="modalVer">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Datos del Jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>
    <div class="modal-body">
      <div class="detalle" id="detalle"></div>
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cerrar</button>
        <button class="btn btn-primary" onclick="editarDesdeVer()">Editar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ASISTENCIA -->
<div class="modal" id="modalAsist">
  <div class="modal-box" style="max-width: 650px;">
    <div class="modal-head">
      <h3>🏉 Asistencia - <span id="nombreAsist"></span></h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>
    <div class="modal-body" id="modalAsistBody">
      <div id="semanas"></div>
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cerrar</button>
        <button class="btn btn-primary" onclick="guardarAsist()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLUB -->
<div class="modal" id="modalClub">
  <div class="modal-box">
    <div class="modal-head">
      <h3>💳 Cuotas Club - <span id="nombreClub"></span></h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:11px; color:var(--muted); margin-bottom:12px;">12 cuotas del año</p>
      <div class="meses" id="meses"></div>
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cerrar</button>
        <button class="btn btn-primary" onclick="guardarClub()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL UNION -->
<div class="modal" id="modalUnion">
  <div class="modal-box">
    <div class="modal-head">
      <h3>🏛️ Cuotas Unión - <span id="nombreUnion"></span></h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Cuota 1</label>
          <div class="check-item">
            <input type="checkbox" id="cuota1" class="check">
            <label>Pagada</label>
          </div>
        </div>
        <div class="form-group">
          <label>Cuota 2</label>
          <div class="check-item">
            <input type="checkbox" id="cuota2" class="check">
            <label>Pagada</label>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cerrar</button>
        <button class="btn btn-primary" onclick="guardarUnion()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
var API = "https://script.google.com/macros/s/AKfycbxb7tQ25fZ7gfaRzEQiyDv52N02wMf9MCl_Cs5RlwYTYJnhAolVMVnDP6n_0RQEyBx9/exec";
//para guardar datos del jugador nuevo
async function guardar() {
  var postData = {
    accion: "guardar_jugador",
    dni: document.getElementById('dni').value,
    nombre: document.getElementById('nombre').value,
    celular: document.getElementById('celular').value,
    correo: document.getElementById('correo').value,
    puesto1: document.getElementById('p1').value,
    puesto2: document.getElementById('p2').value,
    puesto3: document.getElementById('p3').value
  };

  if (!postData.dni || !postData.nombre) {
    alert("Falta DNI o Nombre");
    return;
  }

  showMsg("Guardando...", "loading");

  try {
    let resp = await safeFetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(postData)
    });

    let text = await resp.text();
    console.log("RESP SERVIDOR:", text);

    let r = JSON.parse(text);

    if (r.ok) {
      showMsg("Jugador guardado", "success");
      cerrar();
      cargar();
    } else {
      throw new Error(r.error || "Error al guardar");
    }

  } catch (err) {
    console.error(err);
    showMsg(err.message, "error");
  }
}
/* =========================
   FETCH SEGURO
========================= */
async function safeFetch(url, options) {
  try {
    let resp = await fetch(url, options);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp;
  } catch (err) {
    try {
      let proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
      let resp2 = await fetch(proxyUrl, options);
      if (!resp2.ok) throw new Error("Proxy HTTP " + resp2.status);
      return resp2;
    } catch (e) {
      throw new Error("Sin conexión al servidor");
    }
  }
}

/* =========================
   VARIABLES
========================= */
var tab = "jugadores";
var datos = { jugadores: [], asistencia: [], club: [], union: [] };

/* =========================
   INIT
========================= */
function init() {
  cargar();
}

/* =========================
   HELPERS
========================= */
function getVal(row, idx) {
  return row["c" + idx] || "";
}

function getDNI(row, sheet) {
  return sheet === "jugadores" ? getVal(row, 1) : getVal(row, 0);
}

function getNombre(row, sheet) {
  return sheet === "jugadores" ? getVal(row, 2) : getVal(row, 1);
}

/* =========================
   CARGAR
========================= */
async function cargar() {
  try {
    let resp = await safeFetch(API);
    let text = await resp.text();
    let json = JSON.parse(text);

    datos = json.datos || {};
    render();
  } catch (err) {
    console.error(err);
  }
}

/* =========================
   RENDER
========================= */
function render() {
  var busq = (document.getElementById('buscar')?.value || "").toLowerCase();
  var t = document.getElementById('tabla');

  if (!t) return;

  var html = "";

  if (tab === "jugadores") {
    var lista = (datos.jugadores || []).filter(j => {
      let dni = getDNI(j, "jugadores");
      let nom = getNombre(j, "jugadores");
      return !busq ||
        (nom || "").toLowerCase().includes(busq) ||
        (dni || "").includes(busq);
    });

    if (!lista.length) {
      t.innerHTML = "<div style='padding:40px;text-align:center'>Sin jugadores</div>";
      return;
    }

    html = "<div class='tabla-body'>";

    lista.forEach(j => {
      let nom = getNombre(j, "jugadores") || "";
      let dni = getDNI(j, "jugadores");

      html += `
        <div class="fila">
          <div class="avatar">${nom.charAt(0)}</div>
          <div class="dato">
            <div>${nom}</div>
            <div>DNI: ${dni}</div>
          </div>
          <div class="badge">${getVal(j,4)}</div>
          <div>
            <button class="btn btn-sm btn-sec ver-btn" data-dni="${dni}">Ver</button>
          </div>
        </div>
      `;
    });

    html += "</div>";
  }

  t.innerHTML = html;
}

/* =========================
   EVENTO GLOBAL (FIX BOTÓN VER)
========================= */
document.addEventListener("click", function(e) {
  let btn = e.target.closest(".ver-btn");
  if (!btn) return;

  ver(btn.dataset.dni);
});

/* =========================
   VER JUGADOR
========================= */
function ver(dni) {
  let j = (datos.jugadores || []).find(x => getVal(x,1) == dni);
  if (!j) {
    alert("Jugador no encontrado");
    return;
  }

  document.getElementById('detalle').innerHTML = `
    <p><b>DNI:</b> ${getVal(j,1)}</p>
    <p><b>Nombre:</b> ${getVal(j,2)}</p>
    <p><b>Celular:</b> ${getVal(j,3)}</p>
    <p><b>Correo:</b> ${getVal(j,7) || "-"}</p>
    <p><b>Puesto 1:</b> ${getVal(j,5) || "-"}</p>
    <p><b>Puesto 2:</b> ${getVal(j,6) || "-"}</p>
    <p><b>Puesto 3:</b> ${getVal(j,4) || "-"}</p>
  `;

  document.getElementById('modalVer').classList.add('show');
}


function abrirModal(dni = "", nom = "") {
  document.getElementById('titulo').textContent = dni ? "Editar Jugador" : "Nuevo Jugador";

  document.getElementById('idDNI').value = dni;
  document.getElementById('dni').value = dni;
  document.getElementById('dni').disabled = dni ? true : false;

  document.getElementById('nombre').value = nom;

  document.getElementById('celular').value = "";
  document.getElementById('correo').value = "";
  document.getElementById('p1').value = "";
  document.getElementById('p2').value = "";
  document.getElementById('p3').value = "";

  document.getElementById('btnElim').style.display = dni ? "block" : "none";

  document.getElementById('modal').classList.add('show');
}


/* =========================
   CERRAR MODAL
========================= */
function cerrar() {
  document.querySelectorAll('.modal')
    .forEach(m => m.classList.remove('show'));
}

/* =========================
   INPUT BUSCAR
========================= */
document.getElementById('buscar')?.addEventListener('input', render);

/* =========================
   INIT
========================= */
init();
</script>

</body>
</html>
