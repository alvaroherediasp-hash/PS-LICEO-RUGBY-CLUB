<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia - Liceo Rugby</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="header-left">
    <h1>🏉 Sistema de Asistencia</h1>
  </div>

  <button class="btn btn-sec" onclick="location.href='index.html'">
    ← Volver
  </button>
</div>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar">
  <button class="btn btn-primary" onclick="abrirModalAsistencia()">
    ➕ Cargar asistencia
  </button>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <!-- 🔥 TABLA -->
  <div class="card">
    <div class="card-head">
      <h3>📊 Jugadores</h3>
    </div>

    <div id="tablaAsistencia" class="tabla">
      <p>Cargando jugadores...</p>
    </div>
  </div>

  <!-- 🔥 CALENDARIO PRO -->
  <div class="card">
    <div class="card-head">
      <h3>📅 Calendario de Asistencia</h3>
    </div>

    <!-- encabezado mes -->
    <div class="calendar-header">
      <button onclick="cambiarMes(-1)">◀</button>
      <h4 id="mesActual"></h4>
      <button onclick="cambiarMes(1)">▶</button>
    </div>

    <!-- días -->
    <div id="calendario"></div>
  </div>

</div>

<!-- ================= MODAL CARGAR / EDITAR ================= -->
<div class="modal" id="modalAsistencia">

  <div class="modal-box">

    <div class="modal-head">
      <h3 id="tituloModalAsistencia">Registrar asistencia</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">

      <input type="hidden" id="asistenciaId">

      <div class="form-group">
        <label>Jugador</label>
        <select id="jugadorSelect"></select>
      </div>

      <div class="form-group">
        <label>Semana</label>
        <select id="semana"></select>
      </div>

      <div class="form-group">
        <label>Fecha (lunes de la semana)</label>
        <input type="date" id="fechaSemana">
      </div>

      <div class="form-row">
        <label><input type="checkbox" id="dia1"> Martes</label>
        <label><input type="checkbox" id="dia2"> Jueves</label>
        <label><input type="checkbox" id="dia3"> Domingo (Partido)</label>
      </div>

      <div class="form-group">
        <label>Detalle</label>
        <textarea id="detalleSemana"></textarea>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <input id="estadoSemana" disabled>
      </div>

      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarAsistencia()">
          💾 Guardar
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL VER ================= -->
<div class="modal" id="modalJugador">
  <div class="modal-box" style="max-width:900px">

    <div class="modal-head">
      <h3>📊 Historial del jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">
      <div id="detalleJugador"></div>
    </div>

  </div>
</div>

<!-- ================= JS ================= -->
<script type="module" src="firebase.js"></script>
<script src="asistencia.js"></script>

</body>
</html>
