<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Rugby Club</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0f172a;
  color: #e5e7eb;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.header h1 {
  font-size: 20px;
}

/* ===== BOTONES ===== */
button {
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.btn-nuevo {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: bold;
}

.btn-nuevo:hover {
  transform: scale(1.05);
}

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 15px 30px;
}

.toolbar input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1e293b;
  color: white;
}

.toolbar button {
  background: #334155;
  color: white;
  padding: 12px;
  border-radius: 12px;
}

/* ===== MAIN ===== */
.main {
  padding: 20px 30px;
}

/* ===== TABLA ===== */
.tabla {
  display: grid;
  gap: 12px;
}

/* CARD JUGADOR */
.fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #1e293b, #020617);
  padding: 15px 18px;
  border-radius: 14px;
  border: 1px solid #1e293b;
  transition: 0.2s;
}

.fila:hover {
  transform: translateY(-2px);
  border-color: #3b82f6;
}

/* ACCIONES */
.acciones button {
  background: #3b82f6;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
}

/* ===== MODAL ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal.show {
  display: flex;
}

.modal-box {
  background: #020617;
  padding: 25px;
  border-radius: 18px;
  width: 420px;
  max-width: 95%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.modal-head {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

/* INPUTS */
.modal-body input,
.modal-body select {
  width: 100%;
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

/* ACCIONES */
.acciones {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

#btnGuardar {
  flex: 1;
  background: #22c55e;
  color: white;
  padding: 12px;
  border-radius: 10px;
}

#btnEditar {
  background: #f59e0b;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

#btnEliminar {
  background: #ef4444;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

/* ===== DETALLE ===== */
#detalle p {
  margin: 6px 0;
  font-size: 14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>🏉 Liceo Rugby Club</h1>
  <button class="btn-nuevo" id="btnNuevo">+ Nuevo</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input id="buscar" placeholder="Buscar jugador...">
  <button id="btnReload">🔄</button>
</div>

<!-- MAIN -->
<div class="main">
  <div id="estado"></div>
  <div id="tabla" class="tabla">Cargando...</div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-head">
      <h3 id="tituloModal">Nuevo Jugador</h3>
      <button id="btnCerrar">✖</button>
    </div>

    <div class="modal-body">

      <input id="dni" placeholder="DNI">
      <input id="nombre" placeholder="Nombre">
      <input id="apodo" placeholder="Apodo">
      <input id="celular" placeholder="Celular">
      <input id="correo" placeholder="Correo">

      <!-- SELECTS COMPLETOS -->
      <select id="p1">
        <option value="">Puesto 1</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <select id="p2">
        <option value="">Puesto 2</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <select id="p3">
        <option value="">Puesto 3</option>
        <option>1-PILAR IZQUIERDO</option>
        <option>2-HOOKER</option>
        <option>3-PILAR DERECHO</option>
        <option>4-SEGUNDA LINEA</option>
        <option>5-SEGUNDA LINEA</option>
        <option>6-TERCERA LINEA</option>
        <option>7-TERCERA LINEA</option>
        <option>8-TERCERA LINEA</option>
        <option>9-MEDIO SCRUM</option>
        <option>10-APERTURA</option>
        <option>11-WING</option>
        <option>12-CENTRO</option>
        <option>13-CENTRO</option>
        <option>14-WING</option>
        <option>15-FULLBACK</option>
      </select>

      <div class="acciones">
        <button id="btnGuardar">💾 Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL VER -->
<div class="modal" id="modalVer">
  <div class="modal-box">

    <div class="modal-head">
      <h3>Jugador</h3>
      <button onclick="cerrar()">✖</button>
    </div>

    <div id="detalle"></div>

    <div class="acciones">
      <button id="btnEditar">✏️ Editar</button>
      <button id="btnEliminar">🗑 Eliminar</button>
    </div>

  </div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
