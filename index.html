<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Rugby Club</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="header-left">
    <div class="icon">🏉</div>
    <div>
      <h1>Liceo Rugby Club</h1>
      <div class="conectar-box" id="conectar">
        <span class="punto"></span>
        <span>Conectando...</span>
      </div>
    </div>
  </div>

  <button class="btn-nuevo" onclick="abrirModal()">+ Nuevo</button>
</div>

<!-- ================= TABS ================= -->
<div class="tabs">

  <div class="tab active" data-tab="jugadores">👥 Jugadores</div>

<button onclick="location.href='asistencia.html'">
  Asistencia
</button>

  <div class="tab" data-tab="club">💳 Cuotas Club</div>
  <div class="tab" data-tab="union">🏛️ Cuotas Unión</div>

</div>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar">
  <input class="buscar" id="buscar" placeholder="Buscar jugador...">
  <button class="btn btn-primary" onclick="cargar()">🔄</button>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <div class="estado" id="estado"></div>

  <div class="tabla" id="tabla">
    <div style="padding:30px;text-align:center;color:#9ca3af">
      Cargando...
    </div>
  </div>

</div>

<!-- ================= MODAL JUGADOR ================= -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-head">
      <h3>Nuevo Jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">

      <input type="text" id="dni" placeholder="DNI">
      <input type="text" id="nombre" placeholder="Nombre">
      <input type="text" id="celular" placeholder="Celular">
      <input type="email" id="correo" placeholder="Correo">

      <div class="form-row">
        <div class="form-group">
          <select id="p1">
            <option value="">Puesto 1</option>
            <option>1-PILAR IZQUIERDO</option>
            <option>2-HOOKER</option>
            <option>3-PILAR DERECHO</option>
            <option>4-SEGUNDA LINEA</option>
            <option>5-SEGUNDA LINEA</option>
            <option>6-TERCERA LINEA</option>
            <option>7-TERCERA LINEA</option>
            <option>8-TERCERA LINEA</option>
            <option>9-MEDIO SCRUM</option>
            <option>10-APERTURA</option>
            <option>11-WING</option>
            <option>12-CENTRO</option>
            <option>13-CENTRO</option>
            <option>14-WING</option>
            <option>15-FULLBACK</option>
          </select>
        </div>

        <div class="form-group">
          <select id="p2">
            <option value="">Puesto 2</option>
            <option>1-PILAR IZQUIERDO</option>
            <option>2-HOOKER</option>
            <option>3-PILAR DERECHO</option>
            <option>4-SEGUNDA LINEA</option>
            <option>5-SEGUNDA LINEA</option>
            <option>6-TERCERA LINEA</option>
            <option>7-TERCERA LINEA</option>
            <option>8-TERCERA LINEA</option>
            <option>9-MEDIO SCRUM</option>
            <option>10-APERTURA</option>
            <option>11-WING</option>
            <option>12-CENTRO</option>
            <option>13-CENTRO</option>
            <option>14-WING</option>
            <option>15-FULLBACK</option>
          </select>
        </div>
      </div>

      <select id="p3">
        <option value="">Puesto 3</option>
        <option>1-PILAR IZQUIERDO</option>
            <option>2-HOOKER</option>
            <option>3-PILAR DERECHO</option>
            <option>4-SEGUNDA LINEA</option>
            <option>5-SEGUNDA LINEA</option>
            <option>6-TERCERA LINEA</option>
            <option>7-TERCERA LINEA</option>
            <option>8-TERCERA LINEA</option>
            <option>9-MEDIO SCRUM</option>
            <option>10-APERTURA</option>
            <option>11-WING</option>
            <option>12-CENTRO</option>
            <option>13-CENTRO</option>
            <option>14-WING</option>
            <option>15-FULLBACK</option>
      </select>

      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL VER ================= -->
<div class="modal" id="modalVer">
  <div class="modal-box">

    <div class="modal-head">
      <h3>Jugador</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">
      <div class="detalle" id="detalle"></div>

      <div class="actions">
        <button class="btn btn-sec" onclick="cerrar()">Cerrar</button>
      </div>
    </div>

  </div>
</div>


<!-- MODAL ASISTENCIA -->
<div class="modal" id="modalAsistencia">
  <div class="modal-box" style="max-width: 900px; width: 95%;">

    <div class="modal-head">
      <h3>🏉 Asistencia</h3>
      <button class="modal-close" onclick="cerrar()">×</button>
    </div>

    <div class="modal-body">

      <!-- REGISTRAR -->
      <h4>📌 Registrar asistencia</h4>

      <div class="form-row">

        <div class="form-group">
          <label>Jugador</label>
          <select id="selectJugadorAsistencia"></select>
        </div>

        <div class="form-group">
          <label>Semana</label>
          <select id="semana"></select>
        </div>

      </div>

      <div class="form-row">
        <label><input type="checkbox" id="dia1"> Día 1</label>
        <label><input type="checkbox" id="dia2"> Día 2</label>
        <label><input type="checkbox" id="dia3"> Día 3</label>
      </div>

      <button class="btn btn-primary" onclick="guardarAsistencia()">
        Guardar
      </button>

      <hr>

      <!-- VISTA GENERAL -->
      <h4>📊 Asistencia general</h4>
      <div id="tablaAsistencia"></div>

      <hr>

      <!-- VISTA POR JUGADOR -->
      <h4>👤 Ver por jugador</h4>

      <div class="form-group">
        <select id="selectJugadorVista" onchange="cargarAsistenciaJugador()"></select>
      </div>

      <div id="tablaAsistenciaJugador"></div>

    </div>
  </div>
</div>
<!-- ================= JS ================= -->
<script src="app.js"></script>



</body>
</html>
